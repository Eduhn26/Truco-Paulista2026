services:
  postgres:
    image: postgres:16-alpine
    container_name: truco-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - '${POSTGRES_PORT:-51214}:5432'
    volumes:
      - truco_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}',
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: truco-paulista-backend
    container_name: truco-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-replace-with-a-real-secret}
      AUTH_TOKEN_EXPIRES_IN: ${AUTH_TOKEN_EXPIRES_IN:-7d}
      PYTHON_BOT_ENABLED: ${PYTHON_BOT_ENABLED:-false}
      PYTHON_BOT_BASE_URL: ${PYTHON_BOT_BASE_URL:-http://python-bot-service:8000}
      PYTHON_BOT_TIMEOUT_MS: ${PYTHON_BOT_TIMEOUT_MS:-1500}
    command: ['npm', 'run', 'prisma:deploy']
    restart: 'no'

  backend:
    image: truco-paulista-backend
    container_name: truco-backend
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-replace-with-a-real-secret}
      AUTH_TOKEN_EXPIRES_IN: ${AUTH_TOKEN_EXPIRES_IN:-7d}
      PYTHON_BOT_ENABLED: ${PYTHON_BOT_ENABLED:-false}
      PYTHON_BOT_BASE_URL: ${PYTHON_BOT_BASE_URL:-http://python-bot-service:8000}
      PYTHON_BOT_TIMEOUT_MS: ${PYTHON_BOT_TIMEOUT_MS:-1500}
    ports:
      - '${PORT:-3000}:3000'
    restart: unless-stopped

volumes:
  truco_pgdata: